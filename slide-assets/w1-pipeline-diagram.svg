<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1400" height="760" rx="24" fill="#f8fafc"/>
  <text x="70" y="70" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">W1 AIOps Detection &amp; Triage Pipeline</text>
  <text x="70" y="108" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#64748b">Metrics and logs are fused into one explainable incident decision.</text>

  <g filter="url(#shadow)">
    <rect x="65" y="165" width="210" height="132" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="95" y="207" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#2563eb">Telemetry</text>
    <text x="95" y="244" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">metrics CSV</text>
    <text x="95" y="270" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">JSONL logs</text>

    <rect x="355" y="165" width="240" height="132" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="385" y="207" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#2563eb">Isolation Forest</text>
    <text x="385" y="244" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">RAM + GC pause</text>
    <text x="385" y="270" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">p99 latency + errors</text>

    <rect x="675" y="165" width="240" height="132" rx="14" fill="#ffffff" stroke="#fde68a"/>
    <text x="705" y="207" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#d97706">Weighted Vote</text>
    <text x="705" y="244" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">metric weights</text>
    <text x="705" y="270" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">service confidence</text>

    <rect x="995" y="165" width="270" height="132" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="1025" y="207" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#16a34a">Noise Filters</text>
    <text x="1025" y="244" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">weighted threshold</text>
    <text x="1025" y="270" font-family="JetBrains Mono, monospace" font-size="15" fill="#475569">M out of N windows</text>
  </g>

  <path d="M 275 231 L 345 231" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 595 231 L 665 231" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 915 231 L 985 231" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="180" y="420" width="300" height="145" rx="16" fill="#0f172a"/>
    <text x="215" y="462" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#f59e0b">Incident Decision</text>
    <text x="215" y="503" font-family="JetBrains Mono, monospace" font-size="16" fill="#cbd5e1">cart-service @ 17:46:30 UTC</text>
    <text x="215" y="531" font-family="JetBrains Mono, monospace" font-size="16" fill="#cbd5e1">cascade: gateway - order - payment</text>

    <rect x="570" y="420" width="300" height="145" rx="16" fill="#ffffff" stroke="#fecaca"/>
    <text x="605" y="462" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#dc2626">Drain3 RCA</text>
    <text x="605" y="503" font-family="JetBrains Mono, monospace" font-size="16" fill="#475569">cache eviction failed</text>
    <text x="605" y="531" font-family="JetBrains Mono, monospace" font-size="16" fill="#475569">GC overhead + slow /api/cart</text>

    <rect x="960" y="420" width="300" height="145" rx="16" fill="#ffffff" stroke="#fed7aa"/>
    <text x="995" y="462" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#ea580c">Action</text>
    <text x="995" y="503" font-family="JetBrains Mono, monospace" font-size="16" fill="#475569">fix cache max size/LRU</text>
    <text x="995" y="531" font-family="JetBrains Mono, monospace" font-size="16" fill="#475569">add circuit breaker</text>
  </g>

  <path d="M 1130 297 C 1130 360 330 340 330 410" stroke="url(#warm)" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 480 492 L 560 492" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 870 492 L 950 492" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="70" y="635" width="1260" height="48" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="95" y="666" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">Final choice:</text>
  <text x="215" y="666" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#9a3412">Isolation Forest + weighted voting + weighted filter + M/N persistence + Drain3 log templates.</text>
</svg>
